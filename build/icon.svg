<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect (same style as in-app logo) -->
  <rect width="256" height="256" rx="56" fill="url(#bgGrad)"/>

  <!-- Subtle top shine -->
  <rect width="256" height="128" rx="56" fill="url(#shineGrad)"/>

  <!-- Download vertical line -->
  <line x1="128" y1="62" x2="128" y2="158" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- Chevron arrow (pointing down) -->
  <path d="M80 120 L128 168 L176 120" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom tray/underline curve -->
  <path d="M68 194 C96 206, 160 206, 188 194" fill="none" stroke="white" stroke-width="20" stroke-linecap="round"/>
</svg>
